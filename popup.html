<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --primary: #ff0000; /* YouTube Red */
      --accent: #6366f1; /* Indigo AI Purple */
      --bg: #0f0f0f;
      --card: #1e1e1e;
      --text: #ffffff;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      width: 280px;
      padding: 16px;
      margin: 0;
      border-radius: 12px;
    }

    h3.logo {
  margin: 0 0 16px 0;
  font-size: 1.4rem; /* Slightly larger to accommodate the logo */
  font-weight: 800;
  display: flex; /* We use flex here ONLY to align image and text vertically */
  align-items: center;
  color: var(--text);
  letter-spacing: -0.5px;
}

h3.logo img {
  width: 28px; /* Adjust based on your logo's aspect ratio */
  height: 28px;
  margin-right: 6px; /* Space between the image and the word "You" */
  object-fit: contain;
}

h3.logo span {
  color: var(--primary);
  /* No margin-right here ensures "You" and "Dub" touch */
}

    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: -8px;
    }

    select {
      background: var(--card);
      border: 1px solid #333;
      color: white;
      padding: 10px;
      border-radius: 8px;
      outline: none;
      transition: border 0.2s;
      cursor: pointer;
    }

    select:focus {
      border-color: var(--accent);
    }

    button {
      background: linear-gradient(135deg, var(--primary) 0%, #b91c1c 100%);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    button:hover {
      opacity: 0.9;
    }

    button:active {
      transform: scale(0.97);
    }

    button:disabled {
      background: #333;
      cursor: not-allowed;
    }

    .status-box {
      margin-top: 12px;
      padding: 10px;
      background: #161616;
      border-radius: 8px;
      font-size: 0.75rem;
      border-left: 3px solid var(--accent);
    }

    .status-text {
      color: #ccc;
    }

    /* Simple pulse for "Processing" state */
    .pulse {
      height: 8px;
      width: 8px;
      background-color: var(--accent);
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      animation: pulse-animation 1.5s infinite;
    }

    @keyframes pulse-animation {
      0% { box-shadow: 0 0 0 0px rgba(99, 102, 241, 0.4); }
      100% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); }
    }
.visualizer-outer {
    display: flex;
    background: #0f0f0f;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 10px;
    position: relative;
    height: 170px;
}

/* Keeps labels on the left, not moving */
.y-axis-fixed {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding-right: 10px;
    color: #888;
    font-size: 10px;
    font-weight: bold;
    height: 130px; /* Matches canvas drawing area */
    margin-top: 10px;
}

.waveform-scroll-container {
    flex-grow: 1;
    overflow-x: auto;
    overflow-y: hidden;
    white-space: nowrap;
    cursor: crosshair;
}

/* Modern Scrollbar Styling */
.waveform-scroll-container::-webkit-scrollbar {
    height: 6px;
}
.waveform-scroll-container::-webkit-scrollbar-thumb {
    background: #333;
    border-radius: 10px;
}

#waveform {
    display: block;
    /* Width will be set dynamically in JS */
}

.timer-container {
    margin-top: 8px;
    text-align: center;
}

#time-info {
    font-family: 'Courier New', monospace;
    font-size: 18px;
    color: #22ff88;
    text-shadow: 0 0 5px rgba(34, 255, 136, 0.5);
}
/* Header with Logo + Buttons */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

/* Feature Buttons - Top Right, Horizontal */
.feature-buttons {
    display: flex;
    gap: 10px;
}

.icon-btn {
    width: 46px;
    height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000000;
    border: 1px solid #444;
    border-radius: 12px;
    color: #ddd;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
}

.icon-btn:hover {
    background: #2a2a2a;
    border-color: #22ff88;
    color: #22ff88;
    transform: translateY(-2px);
}

.icon-btn:active {
    transform: scale(0.92);
}
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <div class="container">
    
    <!-- Logo and Title -->
    <div class="header">
      <h3 class="logo">
          <img src="images/image4.png" alt="YouDub Logo">
          <span>You</span>Dub
      </h3>

      <!-- Feature Buttons - Top Right -->
      <div class="feature-buttons">
        <button id="auto-dub-self" class="icon-btn" title="Auto Dub Self Audio">
            <i class="fa-solid fa-microphone"></i>
        </button>

        <button id="record-video" class="icon-btn" title="Record & Download Video">
          <i class="fa-solid fa-circle-dot"></i>
        </button>
      </div>
    </div>

    <label for="language">Source Language</label>
    <select id="language">
      <option value="hi">Hindi</option>
      <option value="te">Telugu</option>
      <option value="ta">Tamil</option>
    </select>

    <button id="start">
      <span id="btn-text">Start Dubbing</span>
    </button>

    <div id="status-container" style="display: none;">
      <div class="status-box">
        <div class="pulse"></div>
        <span class="status-text" id="status-msg">Initializing WebGPU...</span>
      </div>
    </div>
  </div>

  <!-- Waveform Visualizer -->
  <div class="visualizer-outer">
    <div class="y-axis-fixed">
        <span>High</span>
        <span>0</span>
        <span>Low</span>
    </div>

    <div class="waveform-scroll-container" id="scroll-wrapper">
        <canvas id="waveform" height="150"></canvas>
    </div>
  </div>

  <div class="timer-container">
    <span id="time-info">00:00</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
